name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance and OIDC

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm test

      - name: Get npm token via OIDC (Trusted Publishing)
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" | jq -r '.value')
          NPM_TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\":\"$OIDC_TOKEN\"}" \
            "https://registry.npmjs.org/-/npm/v1/login/oidc" | jq -r '.token')
          echo "::add-mask::$NPM_TOKEN"
          echo "NODE_AUTH_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV

      - run: npm publish --provenance --access public
